version: '3.7'

services:
  prometheus:
    image: prom/prometheus:v3.11.2@sha256:5550dc63da361dc30f6fe02ac0e4dfc736ededfef3c8d12a634db04a67824d78
    ports:
      - '9090:9090'
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    command: >
      --config.file=/etc/prometheus/prometheus.yml --storage.tsdb.path=/prometheus

  grafana:
    platform: linux/amd64

    depends_on:
      prometheus:
        condition: service_started

    build:
      args:
        grafana_version: ${GRAFANA_VERSION:-11.5.1}
    environment:
      # Grafana 13 enables splashScreen by default; the overlay blocks Playwright interactions.
      GF_FEATURE_TOGGLES_splashScreen: 'false'
    extends:
      file: .config/docker-compose-base.yaml
      service: grafana
